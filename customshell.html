<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Godot Game</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000; /* Change if needed */
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #loading img {
            width: 256px; /* Change size if needed */
            height: auto;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <img src="loading.png" alt="Loading" />
    </div>

    <canvas id="canvas"></canvas>

    <script src="95_windows.js"></script>
    <script>
        const engine = new Engine({
            canvas: document.getElementById("canvas"),
        });

        engine.startGame().then(() => {
            document.getElementById("loading").remove();
            document.getElementById("canvas").style.display = "block";
        });
    </script>
</body>
</html>
