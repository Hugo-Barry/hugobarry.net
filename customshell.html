<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Godot Game</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000; /* Change to match your game */
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #loading-screen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000; /* Background behind your image */
        }

        #loading-image {
            width: 256px; /* Adjust size */
            height: auto;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: none; /* Hidden until game loads */
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img id="loading-image" src="loading.png" alt="Loading..." />
    </div>

    <canvas id="canvas"></canvas>

    <script src="godot.loader.js"></script>
    <script>
        const engine = new Engine({
            canvas: document.getElementById("canvas"),
            onProgress: function (current, total) {
                // You can add a progress bar here if you want
            },
        });

        engine.startGame().then(() => {
            // Fade out loading screen
            const loading = document.getElementById("loading-screen");
            const img = document.getElementById("loading-image");
            img.style.opacity = 0;

            setTimeout(() => {
                loading.remove();
                document.getElementById("canvas").style.display = "block";
            }, 500);
        });
    </script>
</body>
</html>
