<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Godot Game</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #loading img {
            width: 100%;
            height: auto;
            max-width: 100%;
            object-fit: contain;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <img src="loading.png" alt="Loading" />
    </div>

    <canvas id="canvas"></canvas>

    <!-- Load the Godot engine -->
    <script src="95_windows.js"></script>

    <script>
        createEngine({
            canvas: document.getElementById("canvas"),
            executable: "95_windows",
        }).then(engine => {
            engine.startGame().then(() => {
                document.getElementById("loading").remove();
                document.getElementById("canvas").style.display = "block";
            });
        });
    </script>
</body>
</html>
